<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>病患清單 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #E2E8F0; padding: 12px; text-align: left; }
        th { background-color: #F8FAFC; color: #0F2443; font-weight: bold; }
        tr:hover { background-color: #F1F5F9; }
        .back-link { display: inline-block; margin-top: 20px; color: #14B8A6; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>病患清單</h1>

    <table>
        <thead>
            <tr>
                <th>病歷號</th>
                <th>姓名</th>
                <th>性別</th>
                <th>電話</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="patient : ${patients}">
                <td th:text="${patient.chartNo}">P001</td>
                <td th:text="${patient.name}">王小明</td>
                <td th:text="${patient.gender}">男</td>
                <td th:text="${patient.phone}">0912-345-678</td>
            </tr>
        </tbody>
    </table>

    <a th:href="@{/}" class="back-link">← 回首頁</a>
</body>
</html>

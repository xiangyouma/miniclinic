<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
</head>
<body>
    <h2>修改密碼 (<span th:text="${loggedInDoctorName}"></span>)</h2>
    
    <div th:if="${errorMessage}" style="color: red;" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" style="color: green;" th:text="${successMessage}"></div>
    
    <form th:action="@{/password}" method="post" th:object="${passwordForm}">
        <div>
            <label>舊密碼:</label>
            <input type="password" th:field="*{oldPassword}" required/>
        </div>
        <div>
            <label>新密碼 (至少 8 碼):</label>
            <input type="password" th:field="*{newPassword}" required minlength="8"/>
        </div>
        <div>
            <label>確認新密碼:</label>
            <input type="password" th:field="*{confirmPassword}" required minlength="8"/>
        </div>
        <button type="submit">確認修改</button>
    </form>
    
    <br>
    <a href="/dashboard">回儀表板</a>
</body>
</html>
